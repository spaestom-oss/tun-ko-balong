name: Build tun.ko for Huawei E5577 Balong V7R2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: sudo apt-get update -qq && sudo apt-get install -y gcc-arm-linux-gnueabi make bc libssl-dev git

    - name: Clone kernel 3.4
      run: |
        mkdir kernel_src && cd kernel_src
        git init
        git remote add origin https://android.googlesource.com/kernel/common.git
        git fetch --depth=1 origin android-3.4
        git checkout FETCH_HEAD

    - name: Configure and build tun.ko
      run: |
        cd kernel_src
        sed -i 's/^VERSION = .*/VERSION = 3/' Makefile
        sed -i 's/^PATCHLEVEL = .*/PATCHLEVEL = 4/' Makefile
        sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 5/' Makefile
        sed -i 's/^EXTRAVERSION = .*/EXTRAVERSION =/' Makefile
        cp ../tun.c drivers/net/tun.c
        printf '%s\n' \
          'CONFIG_ARM=y' 'CONFIG_CPU_V7=y' 'CONFIG_AEABI=y' 'CONFIG_MMU=y' \
          'CONFIG_PREEMPT=y' 'CONFIG_HZ_100=y' 'CONFIG_HZ=100' 'CONFIG_NO_HZ=y' \
          'CONFIG_MODULES=y' 'CONFIG_MODULE_UNLOAD=y' 'CONFIG_MODVERSIONS=n' \
          'CONFIG_NET=y' 'CONFIG_INET=y' 'CONFIG_UNIX=y' 'CONFIG_PACKET=y' \
          'CONFIG_NETDEVICES=y' 'CONFIG_NET_CORE=y' 'CONFIG_TUN=m' \
          'CONFIG_LOCALVERSION=""' > .config
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabi- olddefconfig
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabi- modules_prepare
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabi- M=drivers/net CONFIG_TUN=m
        ls -la drivers/net/tun.ko
        strings drivers/net/tun.ko | grep vermagic

    - uses: actions/upload-artifact@v4
      with:
        name: tun-ko-balong-v7r2
        path: kernel_src/drivers/net/tun.ko
        if-no-files-found: error
