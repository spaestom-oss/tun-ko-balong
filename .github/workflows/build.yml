name: Build tun.ko for Huawei E5577 Balong V7R2

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - uses: actions/checkout@v4

    - name: Install deps (Ubuntu 20.04 has gcc-arm-linux-gnueabi 9.x)
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          gcc-arm-linux-gnueabi \
          make bc libssl-dev

    - name: Check compiler version
      run: arm-linux-gnueabi-gcc --version

    - name: Download Linux 3.4.113 from kernel.org
      run: |
        wget -q https://cdn.kernel.org/pub/linux/kernel/v3.x/linux-3.4.113.tar.xz
        tar -xf linux-3.4.113.tar.xz
        mv linux-3.4.113 kernel_src
        ls kernel_src/drivers/net/tun.c

    - name: Patch version to 3.4.5 and inject tun.c
      run: |
        cd kernel_src
        sed -i 's/^SUBLEVEL = .*/SUBLEVEL = 5/' Makefile
        cp ../tun.c drivers/net/tun.c
        head -6 Makefile

    - name: Configure and prepare kernel
      run: |
        cd kernel_src
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabi- vexpress_defconfig
        echo 'CONFIG_TUN=m' >> .config
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabi- olddefconfig 2>&1 | tail -3
        grep CONFIG_TUN .config
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabi- modules_prepare 2>&1 | tail -3

    - name: Build tun.ko
      run: |
        cd kernel_src
        make ARCH=arm CROSS_COMPILE=arm-linux-gnueabi- M=drivers/net CONFIG_TUN=m 2>&1 | tail -10
        ls -la drivers/net/tun.ko

    - name: Verify vermagic
      run: |
        strings kernel_src/drivers/net/tun.ko | grep vermagic
        file kernel_src/drivers/net/tun.ko

    - uses: actions/upload-artifact@v4
      with:
        name: tun-ko-balong-v7r2
        path: kernel_src/drivers/net/tun.ko
        if-no-files-found: error
